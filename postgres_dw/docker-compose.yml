services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5444:5432'
    volumes:
      - ./db_data_dw:/var/lib/postgresql/data
    container_name: postgres_timescale_dw
    networks:
      - hopdbt-network

volumes:
  db_data:
    driver: local

networks:
  hopdbt-network:
    external: true